---
openapi: 3.0.1
info:
  title: NextChapter API
  version: v1
  description: JSON API for the NextChapter mobile companion app
servers:
- url: http://localhost:3000
  description: Development
- url: https://nextchapter.fly.dev
  description: Production
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearer_auth: []
paths:
  "/api/v1/clubs":
    parameters: []
    get:
      summary: List clubs
      parameters:
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      tags:
      - Clubs
      security:
      - bearerAuth: []
      responses:
        '200':
          description: clubs listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        description:
                          type: string
                        role:
                          type: string
                        current_cycle:
                          type: object
                          nullable: true
        '401':
          description: missing or invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/clubs/{id}":
    parameters: []
    get:
      summary: Get club
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: Authorization
        in: header
        required: true
        description: Bearer token
        schema:
          type: string
      tags:
      - Clubs
      security:
      - bearerAuth: []
      responses:
        '200':
          description: club found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      description:
                        type: string
                      role:
                        type: string
                      members:
                        type: array
                      current_cycle:
                        type: object
                        nullable: true
        '401':
          description: missing or invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '404':
          description: club not found or not a member
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/api/v1/registrations":
    parameters: []
    post:
      summary: Sign up
      parameters: []
      tags:
      - Authentication
      responses:
        '201':
          description: user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      refresh_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    name:
                      type: string
                    email_address:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - name
                  - email_address
                  - password
                  - password_confirmation
              examples:
                valid:
                  summary: Valid registration
                  value:
                    user:
                      name: New User
                      email_address: newuser@example.com
                      password: password123456
                      password_confirmation: password123456
                invalid:
                  summary: Missing required fields
                  value:
                    user:
                      name: ''
                      email_address: bad
                      password: short
                      password_confirmation: ''
  "/api/v1/sessions":
    parameters: []
    post:
      summary: Sign in
      parameters: []
      tags:
      - Authentication
      responses:
        '200':
          description: successful sign in
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      refresh_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email_address:
                  type: string
                password:
                  type: string
              required:
              - email_address
              - password
              examples:
                valid:
                  summary: Valid credentials
                  value:
                    email_address: api_user@example.com
                    password: password123456
                invalid:
                  summary: Invalid credentials
                  value:
                    email_address: api_user@example.com
                    password: wrongpassword
  "/api/v1/sessions/refresh":
    parameters: []
    post:
      summary: Refresh token
      parameters: []
      tags:
      - Authentication
      responses:
        '200':
          description: token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      refresh_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
        '401':
          description: invalid or expired refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
              - refresh_token
              examples:
                valid:
                  summary: Valid refresh token
                  value:
                    refresh_token: ActiveToken123
                invalid:
                  summary: Invalid or expired refresh token
                  value:
                    refresh_token: expiredtoken
