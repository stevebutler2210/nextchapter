<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextChapter — Club Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              DEFAULT: '#fcf9f5',
              'container-lowest': '#ffffff',
              'container-low': '#f7f4f0',
              'container': '#f0ede9',
              'container-high': '#e5e2de',
              'container-highest': '#dbd8d4',
              'variant': '#e1ddd8',
            },
            'on-surface': '#1c1c1a',
            primary: {
              DEFAULT: '#89453a',
              container: '#f4ebe9',
            },
            'on-primary': '#ffffff',
            tertiary: {
              DEFAULT: '#7a826e',
              container: '#eff1ed',
            },
            outline: {
              DEFAULT: '#85827e',
              variant: '#d1cfcc',
            },
          },
          fontFamily: {
            newsreader: ['Newsreader', 'Georgia', 'serif'],
            'work-sans': ['Work Sans', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            sm: '2px',
            DEFAULT: '4px',
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Work Sans', sans-serif; color: #1c1c1a; background: #fcf9f5; }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-40 shrink-0 bg-surface-container-low min-h-screen flex flex-col py-6 px-4">
    <a href="/" class="font-newsreader text-lg tracking-tight font-medium text-on-surface mb-10 block" style="text-decoration:none;">
      <span class="mr-1.5 inline-block" style="font-size:1.1em;">📖</span>NextChapter
    </a>
    <nav class="flex flex-col gap-1">
      <a href="/dashboard" class="font-work-sans text-sm font-medium px-3 py-2 rounded text-on-surface/60 hover:bg-surface-container transition-colors" style="text-decoration:none;">Dashboard</a>
      <a href="#" class="font-work-sans text-sm font-medium px-3 py-2 rounded text-on-surface/60 hover:bg-surface-container transition-colors" style="text-decoration:none;">Log Out</a>
    </nav>
  </aside>

  <main class="flex-1 px-12 py-10">
    <div id="app" class="max-w-3xl"></div>
  </main>

  <script type="text/babel">
    const { useState } = React;

    /* ── Avatar chips ── */
    const avatarColours = ['#89453a','#7a826e','#c4a44a','#6b7d8a','#b07272'];
    const members = [
      {initials:'JS',bg:avatarColours[0]},
      {initials:'MA',bg:avatarColours[1]},
      {initials:'RK',bg:avatarColours[2]},
      {initials:'LT',bg:avatarColours[3]},
      {initials:'PD',bg:avatarColours[4]},
    ];

    function AvatarRow() {
      return (
        <div className="flex -space-x-2">
          {members.map((m,i) => (
            <div key={i} className="w-8 h-8 rounded-full flex items-center justify-center text-white font-work-sans text-[0.6rem] font-semibold uppercase tracking-wide border-2 border-surface" style={{background:m.bg, zIndex:members.length-i}}>
              {m.initials}
            </div>
          ))}
        </div>
      );
    }

    /* ── Badge ── */
    function StateBadge({state}) {
      const map = {
        Nominating: 'bg-tertiary-container text-tertiary',
        Voting: 'bg-surface-container-high text-on-surface',
        Reading: 'bg-primary-container text-primary',
      };
      return (
        <span className={`inline-block font-work-sans text-[0.75rem] font-medium uppercase tracking-widest px-3 py-1 rounded-full ${map[state]}`}>
          {state}
        </span>
      );
    }

    /* ── Book cover placeholder ── */
    function BookCover({size='sm'}) {
      const cls = size === 'lg' ? 'w-24 h-36' : 'w-14 h-20';
      return (
        <div className={`${cls} bg-surface-container-high rounded-sm flex items-center justify-center shrink-0`}>
          <span className="font-work-sans text-[0.5rem] font-medium uppercase tracking-widest text-outline text-center leading-tight px-1">Book<br/>Cover</span>
        </div>
      );
    }

    /* ── Copy Invite Link button ── */
    function CopyLinkBtn() {
      const [copied, setCopied] = useState(false);
      return (
        <button
          onClick={() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }}
          className="font-work-sans text-[0.75rem] font-medium uppercase tracking-widest px-4 py-1.5 rounded-sm border border-outline-variant text-on-surface bg-transparent hover:bg-surface-container transition-colors"
        >
          {copied ? 'Copied!' : 'Copy Link'}
        </button>
      );
    }

    /* ── Shared header ── */
    function ClubHeader({state}) {
      return (
        <div className="mb-10">
          <div className="flex items-start justify-between mb-2">
            <h1 className="font-newsreader text-[1.75rem] font-normal tracking-tight">The Paper &amp; Hearth Book Club</h1>
            <div className="flex items-center gap-3 shrink-0">
              <button className="font-work-sans text-xs font-medium text-tertiary hover:opacity-70">Edit</button>
              <button className="font-work-sans text-xs font-medium text-tertiary hover:opacity-70">Delete</button>
            </div>
          </div>
          <p className="font-work-sans text-sm text-on-surface/65 leading-relaxed mb-4 max-w-lg">
            A cosy corner for discussing and sharing our love for books and warm drinks. Join us for monthly readings and discussions.
          </p>
          <div className="flex items-center gap-4 mb-4">
            <AvatarRow />
          </div>
          <div className="flex items-center gap-3">
            <StateBadge state={state} />
            <CopyLinkBtn />
          </div>
        </div>
      );
    }

    /* ── Nomination item ── */
    const nominations = [
      {title:'The Hidden Life of Trees', author:'Peter Wohlleben', nominatedBy:'Jane Smith', votes:0},
      {title:'Educated', author:'Tara Westover', nominatedBy:'Mark Adams', votes:3},
      {title:'The Night Circus', author:'Erin Morgenstern', nominatedBy:'Rachel Kim', votes:8},
      {title:'A Gentleman in Moscow', author:'Amor Towles', nominatedBy:'Liam Thompson', votes:4},
    ];

    /* ── NOMINATING STATE ── */
    function NominatingView() {
      return (
        <div>
          <ClubHeader state="Nominating" />
          <div className="mb-6">
            <div className="flex items-center gap-3 bg-surface-container rounded-sm px-4 py-3 border border-outline-variant/40">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#85827e" strokeWidth="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/></svg>
              <input type="text" placeholder="Search to Nominate" className="bg-transparent font-work-sans text-sm text-on-surface w-full outline-none placeholder:text-outline" />
            </div>
          </div>
          <div className="bg-surface-container-lowest rounded">
            {nominations.map((n,i) => (
              <div key={i} className={`flex items-center gap-4 px-5 py-4 ${i < nominations.length-1 ? '' : ''}`}>
                <BookCover />
                <div className="flex-1 min-w-0">
                  <p className="font-newsreader text-[1.05rem] font-normal leading-snug">{n.title}</p>
                  <p className="font-work-sans text-xs text-on-surface/55">{n.author}</p>
                  <p className="font-work-sans text-[0.7rem] font-medium uppercase tracking-widest text-on-surface/40 mt-1">Nominated by {n.nominatedBy}</p>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-6">
            <button className="font-work-sans text-xs font-medium text-tertiary hover:opacity-70 uppercase tracking-widest">Close Nominations</button>
          </div>
        </div>
      );
    }

    /* ── VOTING STATE ── */
    function VotingView() {
      const [voted, setVoted] = useState(null);
      return (
        <div>
          <ClubHeader state="Voting" />
          <div className="bg-surface-container-lowest rounded">
            {nominations.map((n,i) => (
              <div key={i} className="flex items-center gap-4 px-5 py-4">
                <BookCover />
                <div className="flex-1 min-w-0">
                  <p className="font-newsreader text-[1.05rem] font-normal leading-snug">{n.title}</p>
                  <p className="font-work-sans text-xs text-on-surface/55">{n.author}</p>
                  <p className="font-work-sans text-[0.7rem] font-medium uppercase tracking-widest text-on-surface/40 mt-1">Nominated by {n.nominatedBy}</p>
                  <p className="font-work-sans text-[0.7rem] font-medium text-on-surface/40 mt-0.5">♡ {n.votes} Vote{n.votes !== 1 ? 's' : ''}</p>
                </div>
                <button
                  onClick={() => setVoted(i)}
                  disabled={voted !== null}
                  className={`shrink-0 font-work-sans text-[0.75rem] font-medium uppercase tracking-widest px-5 py-2 rounded-sm transition-all ${voted === i ? 'bg-surface-container-high text-on-surface/50 cursor-default' : voted !== null ? 'bg-surface-container text-on-surface/30 cursor-default' : 'bg-primary text-on-primary hover:opacity-90'}`}
                >
                  {voted === i ? 'Voted' : 'Cast Vote'}
                </button>
              </div>
            ))}
          </div>
          <div className="mt-6">
            <button className="font-work-sans text-xs font-medium text-tertiary hover:opacity-70 uppercase tracking-widest">Close Voting</button>
          </div>
        </div>
      );
    }

    /* ── READING STATE ── */
    function ReadingView() {
      const [note, setNote] = useState('');
      const [logs] = useState([
        {text:'Just started Chapter 1 — the opening description of the forest is breathtaking. Can\'t wait to discuss this one.', date:'18 Apr 2026', label:'Started'},
        {text:'Chapters 5-8 were fascinating. The way Wohlleben describes root networks as a "wood wide web" completely changed how I see forests.', date:'20 Apr 2026', label:'Progressed'},
      ]);
      return (
        <div>
          <ClubHeader state="Reading" />

          {/* Current book callout */}
          <div className="bg-surface-container-lowest rounded p-6 flex items-center gap-6 mb-8">
            <BookCover size="lg" />
            <div>
              <p className="font-newsreader text-xl font-normal leading-snug">The Hidden Life of Trees</p>
              <p className="font-work-sans text-sm text-on-surface/55 mt-1">Peter Wohlleben</p>
              <p className="font-work-sans text-[0.7rem] font-medium uppercase tracking-widest text-tertiary mt-2">Currently Reading</p>
            </div>
          </div>

          {/* Log a note */}
          <div className="mb-8">
            <p className="font-work-sans text-sm font-medium mb-3">Log a note</p>
            <textarea
              value={note}
              onChange={e => setNote(e.target.value)}
              placeholder="Share your thoughts, favourite quotes, or progress here..."
              className="w-full bg-surface-container border border-outline-variant/40 rounded-sm px-4 py-3 font-work-sans text-sm text-on-surface placeholder:text-outline resize-vertical outline-none focus:border-primary/50 transition-colors"
              rows={3}
            />
            <div className="flex justify-end mt-3">
              <button className="font-work-sans text-[0.75rem] font-medium uppercase tracking-widest bg-primary text-on-primary px-6 py-2.5 rounded-sm hover:opacity-90 transition-opacity">Save Note</button>
            </div>
          </div>

          {/* Reading log */}
          {logs.length > 0 && (
            <div className="flex flex-col gap-4">
              {logs.map((l,i) => (
                <div key={i} className="bg-surface-container-lowest rounded px-5 py-4">
                  <p className="font-work-sans text-sm text-on-surface/80 leading-relaxed mb-2">{l.text}</p>
                  <div className="flex items-center gap-3">
                    <span className="font-work-sans text-[0.7rem] font-medium uppercase tracking-widest text-on-surface/40">{l.date}</span>
                    <span className="font-work-sans text-[0.7rem] font-medium uppercase tracking-widest text-tertiary">{l.label}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ── Tab wrapper ── */
    function App() {
      const [tab, setTab] = useState('nominating');
      const tabs = [
        {id:'nominating', label:'Nominating'},
        {id:'voting', label:'Voting'},
        {id:'reading', label:'Reading'},
      ];
      return (
        <div>
          {/* State tabs */}
          <div className="flex items-center gap-1 mb-8 bg-surface-container-low rounded-sm p-1 self-start inline-flex">
            {tabs.map(t => (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className={`font-work-sans text-[0.75rem] font-medium uppercase tracking-widest px-5 py-2 rounded-sm transition-all ${tab === t.id ? 'bg-surface-container-lowest text-on-surface shadow-sm' : 'text-on-surface/50 hover:text-on-surface/70'}`}
              >
                {t.label}
              </button>
            ))}
          </div>

          {tab === 'nominating' && <NominatingView />}
          {tab === 'voting' && <VotingView />}
          {tab === 'reading' && <ReadingView />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>

  <!-- Tweaks -->
  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "defaultTab": "nominating"
    }/*EDITMODE-END*/;

    let tweaks = { ...TWEAK_DEFAULTS };
    let tweakPanel = null;

    function buildPanel() {
      const panel = document.createElement('div');
      panel.id = 'tweaks-panel';
      panel.style.cssText = 'position:fixed;bottom:16px;right:16px;width:280px;background:#fff;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,0.12);padding:20px;font-family:Work Sans,sans-serif;z-index:9999;display:none;';
      panel.innerHTML = '<p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;color:#1c1c1a;">Tweaks</p><p style="font-size:12px;color:#85827e;">Use the tabs above the club header to switch between Nominating, Voting, and Reading states.</p>';
      document.body.appendChild(panel);
      return panel;
    }

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') {
        if (!tweakPanel) tweakPanel = buildPanel();
        tweakPanel.style.display = 'block';
      }
      if (e.data?.type === '__deactivate_edit_mode') {
        if (tweakPanel) tweakPanel.style.display = 'none';
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>
</body>
</html>
